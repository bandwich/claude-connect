[pytest]
# Pytest configuration for voice mode tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers
markers =
    asyncio: mark test as async
    integration: mark test as integration test (may be slow)
    unit: mark test as unit test

# Async settings
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO

# Coverage (if pytest-cov is installed)
# addopts = --cov=../. --cov-report=term-missing

# Test paths
testpaths = .
